<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        #conteiner {
            background-color: rgba(0, 0, 0, 0.26);
            padding: 20px;
            width: 200px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.377);
        }

        h1 {
            font-size: 1.7em;
        }

        p {
            margin-top: -10px;
        }

        input#pais {
           padding: 10px;
           outline: none;
           border: 1px solid white;
           margin: 5px;
        }

        input#pais:hover {
            border: 1px solid black;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.329);
        }

        
       input#botao {
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0);

       }

       input#botao:hover {
        border: 1px solid black;
        box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.329);
       }

       #res {
        background-color: lightgray;
        margin: 10px;
        border-radius: 5px;
       }

    </style>
</head>
<body> 
     <div id="conteiner">
         <h1>QUAL SEU PAIS</h1>
         <P>coloque seu pais e veja se voce é estrangeiro ou nativo.</P>
         <input type="text" id="pais" placeholder="Nome do seu pais">
         <input type="button" onclick="ver()" value="Ver nacionalidade" id="botao">
          <div id="res">
        
          </div>
     </div>
