<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio</title>
     <style>
       body {
    background-color: rgba(79, 79, 197, 0.938);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

.conteiner {
    background-color: white;
    border-radius: 10px;
    box-shadow: 2px 2px 2px 2px rgba(0, 0, 0, 0.192);
    width: 500px;
    margin: auto;
    padding: 20px;
    text-align: left;
    transition: .3s;
}
 
h1 {
    text-align: center;
    color: white;
}

input {
  text-align: center;
  padding: 10px;
  outline: none;
  border: 1px solid rgba(0, 0, 0, 0.39);
  border-radius: 10px ;
}

button {
    border: 1px solid rgba(0, 0, 0, 0);
    padding: 10px;
    transition: .4s;
}

button:hover {
    border: 1px solid black;
} 
     </style>
</head>
<body>
    <header>
        <h1>Random Title</h1>
    </header>

   <section class="conteiner">
      <div>
         <label for="numb">Numero: </label>
         <input type="number" name="" id="numb">
         <input type="button" value="Gerar tabuada" onclick="gerar()">
      </div>
      <div>
        <select name="tabuada" id="seltab" size="10">
            <option>
                coloque um numero acima
            </option>
        </select>
      </div>
   </section>

    <script src="script.js"></script>
</body>
</html>
