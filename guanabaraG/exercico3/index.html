<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetiçoes</title>
    <style>
        body {
            background-color: rgba(93, 93, 238, 0.856);
        }
    </style>
</head>
<body>
    <h1>Contador</h1>

     <input type="number" id="numero">

     <button onclick="conta()">Contar</button>

      <div id="res">

      </div>

    <script>
        function conta() {
           let num = Number(document.getElementById(`numero`).value)
           let resp = document.getElementById(`res`) 
            
           resp.innerHTML = ``

           for (let i = 1; i <= num; i++) {
            resp.innerHTML += i + `<br>`
           }
        }
    </script>
</body>
</html>
